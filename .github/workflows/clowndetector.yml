name: Clown detector

on:
  pull_request:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Update data
        run: echo "I'm a clown" > imaclown.txt
      - run: git add . && git commit -m "I'm a clown" && git push
